<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tower Defence</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-root">
    <canvas id="game" width="1056" height="672"></canvas>

    <div id="hud">
      <div class="hud-pill">
        <img src="assets/kenney_game-icons/PNG/White/2x/medal1.png" alt="Gold">
        <span id="gold">0</span>
      </div>
      <div class="hud-pill">
        <img src="assets/kenney_game-icons/PNG/White/2x/power.png" alt="HP">
        <span id="lives">0</span>
      </div>
      <div class="hud-pill">
        <img src="assets/kenney_game-icons/PNG/White/2x/leaderboardsSimple.png" alt="Wave">
        <span id="wave">1</span>
      </div>
      <button id="speed-btn" type="button" class="hud-pause hud-speed">x1</button>
      <button id="pause-btn" type="button" class="hud-pause">
        <img src="assets/kenney_game-icons/PNG/White/2x/pause.png" alt="Pause">
      </button>
    </div>

    <div id="wave-banner" class="overlay-message hidden"></div>
    <div id="hint-strip" class="hint-strip hidden"></div>

    <div id="radial-menu" class="radial-menu hidden" aria-hidden="true"></div>

    <div id="main-menu" class="screen-menu">
      <div class="menu-panel">
        <h1>Tank Defence</h1>
        <p id="progress-summary">Жетоны: 0</p>
        <div class="start-wave-control">
          <button id="start-wave-minus" type="button">-</button>
          <span id="start-wave-label">Волна 1</span>
          <button id="start-wave-plus" type="button">+</button>
        </div>
        <button id="start-btn" type="button">Начать игру</button>
        <div id="shop-tabs" class="shop-tabs"></div>
        <div id="shop-grid" class="shop-grid"></div>
      </div>
    </div>

    <div id="pause-menu" class="screen-menu hidden">
      <div class="menu-panel">
        <h2>Пауза</h2>
        <button id="resume-btn" type="button">Продолжить</button>
        <button id="restart-from-pause-btn" type="button">Заново</button>
      </div>
    </div>

    <div id="defeat-menu" class="screen-menu hidden">
      <div class="menu-panel">
        <h2>Поражение</h2>
        <p>База уничтожена.</p>
        <p id="run-reward">Жетоны: +0</p>
        <button id="restart-btn" type="button">Играть снова</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
  <script src="script.js"></script>
</body>
</html>
